name: CICD

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'alpha'
      - 'beta'
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:

jobs:
  get-version:
    permissions:
      contents: write
    uses: IvanJosipovic/templates/.github/workflows/create-release.yaml@main
    with:
      dry_run: true

  build-test:
    needs: get-version
    permissions:
      contents: read
    uses: IvanJosipovic/templates/.github/workflows/csharp-build-test.yaml@main
    with:
      version: ${{ needs.get-version.outputs.new_release_version }}

  create-release:
    needs: build-test
    permissions:
      contents: write
      actions: write
      checks: write
      issues: write
      pull-requests: write
    uses: IvanJosipovic/templates/.github/workflows/create-release.yaml@main
    with:
      dry_run: false

  login:
    name: NuGet login
    needs: create-release
    if: ${{ needs.create-release.outputs.new_release_version == 'true'}}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
    steps:
    - name: NuGet login
      uses: NuGet/login@v1
      id: login
      with:
        user: IvanJosipovic

  publish-nuget:
    needs: login
    uses: IvanJosipovic/templates/.github/workflows/csharp-publish-nuget.yaml@main
    secrets:
      NUGET_API_KEY: ${{ needs.login.outputs.NUGET_API_KEY }}
